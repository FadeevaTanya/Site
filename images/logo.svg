<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 64" fill="none">
  <!-- Стебель -->
  <line x1="38" y1="22" x2="38" y2="52" stroke="#2A2B2E" stroke-width="1.2"/>
  <!-- Цветок-ромашка (центр + 12 лепестков) -->
  <g transform="translate(38 15)" stroke="#2A2B2E" stroke-width="1.2" fill="none">
    <!-- Лепестки -->
    <ellipse cx="0" cy="-10" rx="2.5" ry="6"/>
    <ellipse cx="0" cy="-10" rx="2.5" ry="6" transform="rotate(30)"/>
    <ellipse cx="0" cy="-10" rx="2.5" ry="6" transform="rotate(60)"/>
    <ellipse cx="0" cy="-10" rx="2.5" ry="6" transform="rotate(90)"/>
    <ellipse cx="0" cy="-10" rx="2.5" ry="6" transform="rotate(120)"/>
    <ellipse cx="0" cy="-10" rx="2.5" ry="6" transform="rotate(150)"/>
    <ellipse cx="0" cy="-10" rx="2.5" ry="6" transform="rotate(180)"/>
    <ellipse cx="0" cy="-10" rx="2.5" ry="6" transform="rotate(210)"/>
    <ellipse cx="0" cy="-10" rx="2.5" ry="6" transform="rotate(240)"/>
    <ellipse cx="0" cy="-10" rx="2.5" ry="6" transform="rotate(270)"/>
    <ellipse cx="0" cy="-10" rx="2.5" ry="6" transform="rotate(300)"/>
    <ellipse cx="0" cy="-10" rx="2.5" ry="6" transform="rotate(330)"/>
    <!-- Центр -->
    <circle cx="0" cy="0" r="3" fill="white"/>
    <circle cx="0" cy="0" r="0.8" fill="#2A2B2E"/>
  </g>
  <!-- Листок (как "o" в flowers) -->
  <path d="M30 38 Q30 28, 38 28 Q46 28, 46 38 Q46 48, 38 48 Q30 48, 30 38 Z" 
        stroke="#2A2B2E" stroke-width="1.2" fill="none"/>
  <line x1="32" y1="44" x2="44" y2="32" stroke="#2A2B2E" stroke-width="1.2"/>
  <!-- "f" слева -->
  <text x="14" y="50" font-family="Georgia, serif" font-size="32" font-weight="400" fill="#2A2B2E">f</text>
  <!-- "wers" справа -->
  <text x="50" y="50" font-family="Georgia, serif" font-size="32" font-weight="400" fill="#2A2B2E">wers</text>
</svg>
